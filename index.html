<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Links</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        #linkList {
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            word-wrap: break-word;
        }
        #linkList a {
            display: block;
            margin: 8px 0;
            color: #007bff;
            text-decoration: none;
            font-size: 16px;
        }
        #linkList a:hover {
            text-decoration: underline;
        }
        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>🔗 Proxy Links</h1>
    <div id="linkList">
        <!-- Links will be loaded from links.json -->
        <p>Loading links...</p>
    </div>
    <div class="footer">
        <!-- This message is only visible to you (optional) -->
        <p>To update these links, edit the <code>links.json</code> file in the repository.</p>
    </div>

    <script>
        // Fetch the links from the JSON file and display them
        fetch('links.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to load links');
                }
                return response.json();
            })
            .then(data => {
                const container = document.getElementById('linkList');
                container.innerHTML = ''; // Clear loading message

                if (!data.links || data.links.length === 0) {
                    container.innerHTML = '<p>No proxy links available.</p>';
                    return;
                }

                // Create a clickable link for each entry
                data.links.forEach(item => {
                    const link = document.createElement('a');
                    link.href = item.url;
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    link.textContent = item.name || item.url; // Use name if provided, else URL
                    container.appendChild(link);
                });
            })
            .catch(error => {
                document.getElementById('linkList').innerHTML = '<p>Error loading links. Please try again later.</p>';
                console.error('Error:', error);
            });
    </script>
</body>
</html>
